<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f4f6f9;
  padding:1.5rem;
}

h1{
  margin-bottom:1rem;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:1rem;
  margin-bottom:1rem;
}

input{
  padding:0.6rem;
  border:1px solid #ddd;
  border-radius:6px;
  width:250px;
}

.card{
  background:white;
  padding:1rem;
  border-radius:10px;
  margin-bottom:1rem;
  border:1px solid #eee;
}

.card h3{
  margin-bottom:0.4rem;
}

.meta{
  font-size:0.85rem;
  color:#666;
  margin-bottom:0.3rem;
}

.items{
  font-size:0.9rem;
  margin-top:0.5rem;
}

.total{
  font-weight:600;
  margin-top:0.5rem;
}

.revenue{
  background:#102C57;
  color:white;
  padding:0.8rem 1rem;
  border-radius:8px;
  font-weight:600;
}

.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  font-size:0.75rem;
  font-weight:600;
  margin-left:6px;
}

.cod{
  background:#ff9800;
  color:white;
}

.razorpay{
  background:#2e7d32;
  color:white;
}

</style>
</head>
<body>

<h1>📦 Orders Dashboard</h1>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search name / phone...">
  <div class="revenue">Total Revenue: ₹<span id="revenue">0</span></div>
</div>

<div id="orders"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzqG1YukOwk7Z3ic98B6eHZnPfYX2tmwiB4HFiFWpiK3Tv3f8W1fK9L7M1Y1IEUFTw6Cg/exec?sheet=Orders";

let allOrders = [];

async function loadOrders(){
  try{
    const res = await fetch(API);
    const data = await res.json();

    console.log("📦 Orders:", data);

    if (!Array.isArray(data)) {
      alert("Error loading orders");
      return;
    }

    allOrders = data.reverse();
    renderOrders(allOrders);

  }catch(err){
    console.error(err);
    alert("Failed to load orders");
  }
}

function renderOrders(orders){
  const container = document.getElementById("orders");
  container.innerHTML = "";

  let totalRevenue = 0;

  orders.forEach(order => {

    const name = String(order.Name || "").trim() || "Unknown";
    const phone = String(order.Phone || "").trim() || "-";
    const date = String(order.Date || "").trim() || "-";
    const address = String(order.Address || "").trim() || "-";
    const items = String(order.Items || "").trim() || "-";

    const subtotal = Number(order.Subtotal) || 0;
    const paymentRaw = String(order["Payment Method"] || "").trim().toLowerCase();
    const orderId = String(order["Order ID"] || "-");

    totalRevenue += subtotal;

    let badge = "";
    if (paymentRaw.includes("cod")) {
      badge = `<span class="badge cod">COD</span>`;
    } else if (paymentRaw.includes("razor")) {
      badge = `<span class="badge razorpay">PAID</span>`;
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${name} (${phone}) ${badge}</h3>
      <div class="meta">${date}</div>
      <div>${address}</div>
      <div class="items">${items}</div>
      <div class="total">₹${subtotal}</div>
      <div class="meta">Payment: ${paymentRaw || "-"}</div>
      <div class="meta">Order ID: ${orderId}</div>
    `;

    container.appendChild(div);
  });

  document.getElementById("revenue").textContent = totalRevenue;
}
// 🔍 Search
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();

  const filtered = allOrders.filter(o =>
    (o.Name && o.Name.toLowerCase().includes(val)) ||
    (o.Phone && o.Phone.includes(val))
  );

  renderOrders(filtered);
});

loadOrders();

</script>

</body>
</html>
