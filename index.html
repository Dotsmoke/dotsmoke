<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 90%;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      position: relative;
      height: 100%;
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
    }

    .progress::before {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, #38bdf8, #6366f1, transparent);
      animation: smoothLoad 1.6s ease-in-out infinite;
      border-radius: 10px;
    }

    @keyframes smoothLoad {
      0% {
        left: -40%;
      }
      50% {
        left: 100%;
      }
      100% {
        left: 100%;
      }
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 30px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      color: #fff;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="icon">⚙️</div>
    <h1>We're Under Maintenance</h1>
    <p>Our website is currently undergoing scheduled updates. We'll be back shortly with something even better.</p>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

   
    <div class="footer">
      © 2026 Seras. All rights reserved.
    </div>
  </div>

</body>
</html>
